# Velaris Marketplace Layer-2 — broker gateway.
#
# The ONLY bridge between the internal apps network (where publisher
# containers run with no route out of the host) and the platform. It proxies
# exactly ONE path — /api/v1/broker — to the host nginx's dedicated edge
# listener (172.31.101.1:8210, bound on the velaris-apps-edge gateway
# interface). Every other path 404s here, and the host listener itself also
# serves nothing but the broker: two layers both have to be wrong before an
# app container can reach any other API.
worker_processes 1;
events { worker_connections 128; }
http {
    server {
        listen 80;

        location /api/v1/broker {
            proxy_pass http://172.31.101.1:8210;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        location / { return 404; }
    }
}
