# Auto-generated by HELIX setup wizard
# Only includes services you selected
services:
  # ── Temporal (always required) ──
  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      # Default "temporal" kept as fallback so existing setups still boot, but
      # set VELARIS_TEMPORAL_DB_PASSWORD in your .env — weak default creds plus
      # an exposed port were the 2026-06-19 cryptojacker entry vector.
      POSTGRES_PASSWORD: ${VELARIS_TEMPORAL_DB_PASSWORD:-temporal}
      POSTGRES_DB: temporal
    # NO published port: only the `temporal` container connects to this DB, over
    # the internal compose network (POSTGRES_SEEDS=temporal-db). Never expose a
    # database to the host or network unless something off-Docker must reach it.
    volumes: [temporal-db:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      temporal-db: { condition: service_healthy }
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${VELARIS_TEMPORAL_DB_PASSWORD:-temporal}
      - POSTGRES_SEEDS=temporal-db
    # Loopback-only: the host case-service reaches Temporal at 127.0.0.1:7233.
    # Not reachable from the network.
    ports: ["127.0.0.1:7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on: [temporal]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    # Loopback-only admin UI. Reach it via SSH tunnel, not over the network.
    ports: ["127.0.0.1:8233:8080"]

  helix-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: ${VELARIS_DB_PASSWORD:?not set - run scripts/secrets-render.sh or pass --env-file ~/helix/.env}
      POSTGRES_DB: helix
    # Loopback-only: the host case-service connects at 127.0.0.1:5432. This is
    # your application database — it must NEVER be reachable from the network.
    ports: ["127.0.0.1:5432:5432"]
    volumes: [helix-db:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix"]
      interval: 5s
      retries: 10

  cache:
    # Valkey = Linux Foundation fork of Redis, BSD-3 (Redis 7.4+ moved to
    # SSPL). Protocol-compatible drop-in: same port, same client library.
    # Architecture Report §11 mandates this swap.
    image: valkey/valkey:8-alpine
    # Loopback-only: host case-service reaches the cache at 127.0.0.1:6379.
    ports: ["127.0.0.1:6379:6379"]
    volumes: [cache-data:/data]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      retries: 10

  events:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://events:9092
    # Loopback-only: host case-service reaches the broker at 127.0.0.1:9092.
    ports: ["127.0.0.1:9092:9092"]
    volumes: [events-data:/var/lib/redpanda/data]


  # search (OpenSearch) removed 2026-06-12 — zero references in platform
  # code; it never served a request. Re-add deliberately if a search
  # feature ships, don't resurrect from habit.

  # auth (Keycloak) removed 2026-06-12 — login is the built-in stack
  # (/api/v1/auth/login: bcrypt + RS256 + passkeys; auth_mode="jwt").
  # The OIDC code path (auth_mode="oidc" + oidc_discovery_url) stays in the
  # platform; re-add an IdP container deliberately when a customer needs
  # bring-your-own-IdP, not from habit.

  ollama:
    image: ollama/ollama:latest
    # Loopback-only: host case-service reaches the model server at 127.0.0.1:11434.
    ports: ["127.0.0.1:11434:11434"]
    volumes:
      - ollama-data:/root/.ollama
      - ../../models:/models:ro
    entrypoint: ["/bin/bash", "/models/.ollama-init.sh"]
    
  # ── HxMeet P2 — embedded driver (self-hosted LiveKit SFU, Apache-2.0) ──
  livekit:
    image: livekit/livekit-server:v1.13
    container_name: velaris-livekit
    # Host networking on purpose (same pattern as the gateway):
    #  (a) WebRTC media needs UDP ports on the host interface, and host-mode
    #      ports stay under UFW — bridge-published ports bypass it (the
    #      2026-06-19 incident class);
    #  (b) webhooks must reach the loopback-only API gateway (127.0.0.1:8200).
    # Signalling binds all interfaces so browsers on OTHER devices can join;
    # UFW gates exposure (allow 7880-7881/tcp + 50700-50720/udp from LAN only).
    network_mode: host
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - 0.0.0.0
        rtc:
          tcp_port: 7881
          port_range_start: 50700
          port_range_end: 50720
          use_external_ip: false
        # P3: egress dispatch runs over the existing Valkey (loopback-published).
        redis:
          address: 127.0.0.1:6379
        # Defaults exist only so a fresh install can `compose up openbao`
        # before the first secrets-render (compose interpolates the whole
        # file). They bind loopback-only, and case-service without the
        # rendered VELARIS_CASE_LIVEKIT_* vars keeps the embedded driver
        # fail-closed (501) — mismatched keys can't mint a joinable token.
        keys:
          ${VELARIS_CASE_LIVEKIT_API_KEY:-devkey}: ${VELARIS_CASE_LIVEKIT_API_SECRET:-devsecret_replace_me_00000000000000}
        webhook:
          api_key: ${VELARIS_CASE_LIVEKIT_API_KEY:-devkey}
          urls:
            - http://127.0.0.1:8200/api/v1/meet/webhook/livekit
    restart: unless-stopped

  # ── HxMeet P3 — recording egress worker (separate Apache-2.0 service) ──
  # Renders the room in headless Chrome and writes the MP4 to /out — the
  # shared dir case-service ingests from (sha256 > tenant-DEK seal > case
  # document > audit chain, then the file is deleted). Host networking for
  # the same reasons as livekit; SYS_ADMIN is required by Chrome's sandbox.
  livekit-egress:
    image: livekit/egress:v1.13
    container_name: velaris-livekit-egress
    network_mode: host
    cap_add: [SYS_ADMIN]
    environment:
      EGRESS_CONFIG_BODY: |
        redis:
          address: 127.0.0.1:6379
        api_key: ${VELARIS_CASE_LIVEKIT_API_KEY:-devkey}
        api_secret: ${VELARIS_CASE_LIVEKIT_API_SECRET:-devsecret_replace_me_00000000000000}
        ws_url: ws://127.0.0.1:7880
        insecure: true
    volumes:
      - ${VELARIS_CASE_MEET_RECORDINGS_DIR:-/tmp/velaris-recordings}:/out
    restart: unless-stopped

#  case-service:
#    build: ../../services/case-service
#    ports: ["8200:8200"]
#    depends_on:
#      helix-db: { condition: service_healthy }
#      temporal: { condition: service_started }
#    environment:
#      HELIX_CASE_DATABASE_URL: postgresql+asyncpg://helix:helix_dev_password@helix-db:5432/helix
#      HELIX_CASE_TEMPORAL_HOST: temporal:7233
#      HELIX_CASE_SERVICE_PORT: "8200"

  # ── API Gateway (roadmap #13a — stable /api/v1 prefix + discovery) ──
  # Single ingress; routes by sub-prefix to the owning service. All seams
  # resolve to case-service today (zero behaviour change); each flips to its
  # own service as services are extracted (#13c-e).
  gateway:
    image: nginx:1.27-alpine
    container_name: velaris-gateway
    # Host networking: the gateway reaches case-service on the host loopback
    # (127.0.0.1:8201), which lets case-service bind loopback-ONLY so it cannot
    # be reached around the gateway. nginx itself listens on 127.0.0.1:8200
    # (see gateway/nginx.conf) — nothing is exposed on a public interface.
    network_mode: host
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  # >>> P23 observability services
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: helix-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - helix-prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: [observability]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: helix-otel-collector
    command: ['--config=/etc/otel-collector-config.yaml']
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    profiles: [observability]
  # <<< P23 observability services

  # >>> P24 document storage
  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: helix-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=helix
      - MINIO_ROOT_PASSWORD=${VELARIS_MINIO_PASSWORD:?not set - run scripts/secrets-render.sh or pass --env-file ~/helix/.env}
    # Loopback-only: API (9000) for the host case-service, console (9001) via
    # SSH tunnel. Object storage must not be network-reachable.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - helix-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    depends_on:
      minio: { condition: service_healthy }
    environment:
      - MC_HELIX_PASSWORD=${VELARIS_MINIO_PASSWORD:?not set - run scripts/secrets-render.sh or pass --env-file ~/helix/.env}
    entrypoint: >
      /bin/sh -c "
      mc alias set helix http://minio:9000 helix $${MC_HELIX_PASSWORD};
      mc mb --ignore-existing helix/helix-docs;
      exit 0;
      "
  # <<< P24 document storage

  # >>> P25b mailpit (local dev SMTP/IMAP)
  mailpit:
    image: axllent/mailpit:latest
    container_name: helix-mailpit
    # Loopback-only. mailpit accepts any SMTP auth (MP_SMTP_AUTH_ACCEPT_ANY) and
    # must never be network-reachable — it would be an open relay / data leak.
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:1143:1143"   # IMAP
      - "127.0.0.1:8025:8025"   # Web UI
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
      - MP_DATABASE=/data/mailpit.db
      - MP_MAX_MESSAGES=5000
    volumes:
      - helix-mailpit-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/api/v1/info"]
      interval: 10s
      retries: 5
  # <<< P25b mailpit

  # >>> Group K: OpenBao secrets manager
  # Host port 8350 (8200 belongs to case-service). Loopback-only binding:
  # nothing off-host can reach the secrets API. The app does NOT talk to
  # OpenBao at runtime — the agent renders .env at platform start.
  openbao:
    image: openbao/openbao:2
    container_name: velaris-openbao
    command: ["bao", "server", "-config=/openbao/config/server.hcl"]
    cap_add:
      - IPC_LOCK        # mlock: keep secrets out of swap
    ports:
      - "127.0.0.1:8350:8200"
    volumes:
      - openbao-data:/openbao/data
      - ../openbao/server.hcl:/openbao/config/server.hcl:ro
    healthcheck:
      # uninit/sealed/standby remapped to 200 — "API up" is the health bar;
      # seal state is handled by the start script, not the orchestrator
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8200/v1/sys/health?uninitcode=200&sealedcode=200&standbycode=200"]
      interval: 10s
      retries: 5
  # <<< Group K

volumes:
  temporal-db:
  helix-db:
  cache-data:
  events-data:
  ollama-data:
  helix-minio-data:
  helix-prometheus-data:
  helix-mailpit-data:
  openbao-data:

