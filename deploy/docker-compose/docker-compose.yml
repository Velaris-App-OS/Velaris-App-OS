# Auto-generated by HELIX setup wizard
# Only includes services you selected
services:
  # ── Temporal (always required) ──
  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports: ["5433:5432"]
    volumes: [temporal-db:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      temporal-db: { condition: service_healthy }
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on: [temporal]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports: ["8233:8080"]

  helix-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: ${VELARIS_DB_PASSWORD:-helix_dev_password}
      POSTGRES_DB: helix
    ports: ["5432:5432"]
    volumes: [helix-db:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix"]
      interval: 5s
      retries: 10

  cache:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [cache-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  events:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://events:9092
    ports: ["9092:9092"]
    volumes: [events-data:/var/lib/redpanda/data]


  search:
    image: opensearchproject/opensearch:2.17.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${VELARIS_SEARCH_PASSWORD:-H3lix_Dev!}
    ports: ["9200:9200"]
    volumes: [search-data:/usr/share/opensearch/data]

  auth:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://helix-db:5432/helix
      - KC_DB_USERNAME=helix
      - KC_DB_PASSWORD=${VELARIS_DB_PASSWORD:-helix_dev_password}
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${VELARIS_ADMIN_PASSWORD:-admin}
    ports: ["8090:8080"]
    depends_on: [helix-db]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama-data:/root/.ollama
      - ../../models:/models:ro
    entrypoint: ["/bin/bash", "/models/.ollama-init.sh"]
    
#  case-service:
#    build: ../../services/case-service
#    ports: ["8200:8200"]
#    depends_on:
#      helix-db: { condition: service_healthy }
#      temporal: { condition: service_started }
#    environment:
#      HELIX_CASE_DATABASE_URL: postgresql+asyncpg://helix:helix_dev_password@helix-db:5432/helix
#      HELIX_CASE_TEMPORAL_HOST: temporal:7233
#      HELIX_CASE_SERVICE_PORT: "8200"

  # >>> P23 observability services
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: helix-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - helix-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: [observability]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: helix-otel-collector
    command: ['--config=/etc/otel-collector-config.yaml']
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles: [observability]
  # <<< P23 observability services

  # >>> P24 document storage
  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: helix-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=helix
      - MINIO_ROOT_PASSWORD=${VELARIS_DB_PASSWORD:-helix_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - helix-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set helix http://minio:9000 helix $${VELARIS_DB_PASSWORD:-helix_dev_password};
      mc mb --ignore-existing helix/helix-docs;
      exit 0;
      "
  # <<< P24 document storage

  # >>> P25b mailpit (local dev SMTP/IMAP)
  mailpit:
    image: axllent/mailpit:latest
    container_name: helix-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "1143:1143"   # IMAP
      - "8025:8025"   # Web UI
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
      - MP_DATABASE=/data/mailpit.db
      - MP_MAX_MESSAGES=5000
    volumes:
      - helix-mailpit-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/api/v1/info"]
      interval: 10s
      retries: 5
  # <<< P25b mailpit

volumes:
  temporal-db:
  helix-db:
  cache-data:
  events-data:
  search-data:
  ollama-data:
  helix-minio-data:
  helix-prometheus-data:
  helix-mailpit-data:

