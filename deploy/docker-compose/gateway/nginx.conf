# Velaris API Gateway (roadmap #13a — the API gateway prefix GATE).
#
# Single ingress for all client / SDK / marketplace-package traffic. Routes by
# stable path sub-prefix to the owning service. The client-facing prefix
# (/api/v1/...) is IDENTICAL before and after service extraction (#13c-e):
# today every upstream resolves to the case-service monolith, so this config
# ships with ZERO behaviour change. When a service is extracted, only the
# `server` line in its upstream changes — no client, SDK, or package edits.
#
# See docs/Future/tier2-sequence-and-service-extraction.md.

worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # ── Extraction seams ──────────────────────────────────────────
    # All point at case-service today. At 13c+ each flips to its own
    # service (e.g. server analytics-service:8200) with no other change.
    upstream case_service      { server 127.0.0.1:8201; }
    upstream analytics_service { server 127.0.0.1:8201; }  # 13c -> analytics-service
    upstream hxgraph_service   { server 127.0.0.1:8201; }  # 13d -> hxgraph-sync
    upstream hxmigrate_service { server 127.0.0.1:8201; }  # 13e -> hxmigrate

    map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    server {
        listen 127.0.0.1:8200;

        # Headers inherited by every location below.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # ── Gateway discovery (§6.4) ──────────────────────────────
        # SDK v2 + marketplace packages resolve the stable base from here,
        # never from a hardcoded service address.
        location = /.well-known/velaris-gateway {
            default_type application/json;
            return 200 '{"gateway_base":"/api/v1","api_version":"1","services":{"analytics":"/api/v1/analytics","process_mining":"/api/v1/process-mining","graph":"/api/v1/graph","hxmigrate":"/api/v1/hxmigrate"}}';
        }

        # ── Extraction sub-prefixes (seams) ───────────────────────
        location /api/v1/analytics/      { proxy_pass http://analytics_service; }
        location /api/v1/process-mining/ { proxy_pass http://analytics_service; }
        location /api/v1/graph/          { proxy_pass http://hxgraph_service; }
        location /api/v1/hxmigrate/      { proxy_pass http://hxmigrate_service; }

        # ── WebSocket (realtime) ──────────────────────────────────
        location /api/v1/realtime {
            proxy_pass http://case_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
        }

        # ── WebSocket (HxStream live activity) ────────────────────
        # Mixed path: serves both HTTP routes (/event, /events, …) and the
        # WS route (/ws). A location that sets proxy_set_header drops the
        # server-level ones, so re-declare them here alongside the upgrade
        # headers. For non-WS requests $connection_upgrade maps to "close".
        location /api/v1/hxstream {
            proxy_pass http://case_service;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 3600s;
        }

        # ── WebSocket (HxMeet P4a-live caption stream) ────────────
        # Mixed path like /hxstream: /meet is mostly HTTP, plus the WS
        # captions route — same header re-declaration rule applies.
        location /api/v1/meet {
            proxy_pass http://case_service;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 3600s;
        }

        # ── Everything else -> case-service (the monolith) ────────
        location / { proxy_pass http://case_service; }
    }
}
