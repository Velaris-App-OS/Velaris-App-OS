global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: helix-case-service
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8200']
        labels: { service: case-service }
  - job_name: helix-engine
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8100']
        labels: { service: engine }
