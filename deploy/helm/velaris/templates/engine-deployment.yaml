apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helix.engineName" . }}
  labels: { app: engine }
spec:
  replicas: {{ .Values.engine.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector: { matchLabels: { app: engine } }
  template:
    metadata: { labels: { app: engine } }
    spec:
      containers:
        - name: engine
          image: "{{ .Values.image.engine.repository }}:{{ .Values.image.engine.tag }}"
          imagePullPolicy: {{ .Values.image.engine.pullPolicy }}
          ports:
            - containerPort: {{ .Values.engine.port }}
          env:
            - name: HELIX_ENGINE_DATABASE_URL
              value: {{ include "helix.databaseUrl" . | quote }}
          resources:
            {{- toYaml .Values.engine.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: {{ .Values.engine.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helix.engineName" . }}
spec:
  selector: { app: engine }
  ports:
    - port: 8100
      targetPort: {{ .Values.engine.port }}
      name: http
