apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helix.caseServiceName" . }}
  labels: { app: case-service }
spec:
  replicas: {{ .Values.caseService.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector: { matchLabels: { app: case-service } }
  template:
    metadata: { labels: { app: case-service } }
    spec:
      containers:
        - name: case-service
          image: "{{ .Values.image.caseService.repository }}:{{ .Values.image.caseService.tag }}"
          imagePullPolicy: {{ .Values.image.caseService.pullPolicy }}
          ports:
            - containerPort: {{ .Values.caseService.port }}
          env:
            - name: HELIX_CASE_DATABASE_URL
              value: {{ include "helix.databaseUrl" . | quote }}
            - name: HELIX_CASE_REDIS_URL
              value: {{ include "helix.redisUrl" . | quote }}
            {{- range $k, $v := .Values.caseService.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.caseService.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: {{ .Values.caseService.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: {{ .Values.caseService.port }} }
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helix.caseServiceName" . }}
spec:
  selector: { app: case-service }
  ports:
    - port: 8200
      targetPort: {{ .Values.caseService.port }}
      name: http
