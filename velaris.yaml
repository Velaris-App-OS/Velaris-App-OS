# ═══════════════════════════════════════════════════════════
# VELARIS Configuration
# Generated by setup wizard v2.0.0
# Edit anytime — changes apply on restart
# ═══════════════════════════════════════════════════════════

velaris:
  version: "2.0.0"
  instance: "my-velaris"

  # ── Infrastructure ──
  git: local
  auth: keycloak
  database: postgresql
  cache: redis
  events: redpanda
  search: opensearch
  storage: local

  # ── AI providers ──
  ai:
    providers: [ollama]
    # Map features to models in Helix Studio settings

  # ── Customer channels ──
  telephony: []
  channels: [email, webchat]

  # ── Back-office integrations ──
  integrations: [rest]

  # ── Version control behavior ──
  vcs:
    auto_commit: true
    debounce_seconds: 5
    message_style: descriptive
    sign_commits: true
    branching: gitflow
    auto_branch_on_card: true
    auto_pr_on_review: true
    squash_on_merge: true

  # ── Updates ──
  updates:
    source: "github"                            # "github" or "server"
    github_repo: "Velaris-App-OS/Velaris-App-OS"    # used when source=github
    server_url: "https://updates.velaris.io/latest"  # used when source=server
    # ── Channel-based rollout (Group G) ──
    # This environment follows a release channel; promotion happens centrally
    # by moving the channel pointer in channels.json — no per-env action.
    channel: "stable"             # stable (all client installs) | beta (vendor playground only)
    auto_update: false            # true = apply updates automatically (use with --install-timer)
    update_window: "02:00-05:00"  # auto updates run only inside this window (empty = anytime)
    manifest_branch: "main"       # branch serving channels.json (raw)

  # ── Audit ──
  audit:
    enabled: true
    tamper_proof: true
    retention_days: 2555      # ~7 years
    compliance: []             # add: soc2, gdpr, hipaa as needed
