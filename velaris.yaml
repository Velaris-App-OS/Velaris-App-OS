# ═══════════════════════════════════════════════════════════
# VELARIS Configuration
# Generated by setup wizard v2.0.0
# Edit anytime — changes apply on restart
# ═══════════════════════════════════════════════════════════

velaris:
  version: "1.0.0"
  instance: "my-velaris"

  # ── Infrastructure ──
  git: local
  auth: keycloak
  database: postgresql
  cache: redis
  events: redpanda
  search: opensearch
  storage: local

  # ── AI providers ──
  ai:
    providers: [ollama]
    # Map features to models in Helix Studio settings

  # ── Customer channels ──
  telephony: []
  channels: [email, webchat]

  # ── Back-office integrations ──
  integrations: [rest]

  # ── Version control behavior ──
  vcs:
    auto_commit: true
    debounce_seconds: 5
    message_style: descriptive
    sign_commits: true
    branching: gitflow
    auto_branch_on_card: true
    auto_pr_on_review: true
    squash_on_merge: true

  # ── Updates ──
  updates:
    source: "github"                            # "github" or "server"
    github_repo: "UtpalBhadra93/Velaris-App"    # used when source=github
    server_url: "https://updates.velaris.io/latest"  # used when source=server

  # ── Audit ──
  audit:
    enabled: true
    tamper_proof: true
    retention_days: 2555      # ~7 years
    compliance: []             # add: soc2, gdpr, hipaa as needed
